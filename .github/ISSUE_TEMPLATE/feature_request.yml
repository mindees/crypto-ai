name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the motivation, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - ingestion
        - features / labels
        - model / training
        - evaluation / backtest
        - serving / alerts
        - lifecycle (registry / drift / shadow)
        - docs / CI
        - other
    validations:
      required: true
  - type: checkboxes
    id: principles
    attributes:
      label: Respects project principles
      options:
        - label: Keeps features causal (no lookahead) and metrics honest
          required: true
        - label: Doesn't add a required paid dependency
          required: true
