name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please don't include any API keys or secrets.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the command you ran.
      placeholder: "Running `python -m src.models.train ...` raised ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. pip install -r requirements.txt
        2. python -m ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Output of `python -m src.utils.hardware` is ideal.
      render: shell
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I am not including any secrets/API keys in this report
          required: true
        - label: I searched existing issues and this isn't a duplicate
          required: true
