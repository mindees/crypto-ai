name: weekly-retrain-notice

# Produces a retrain RECOMMENDATION once a week. Never trains a heavy model —
# training happens manually on Kaggle/Colab GPU. This job only reports whether
# enough new data + drift exist to justify a retrain.

on:
  schedule:
    - cron: "23 6 * * 1"   # Mondays 06:23 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  notice:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal deps (NO TensorFlow)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Retrain check (report only)
        run: |
          python -m src.models.retrain_check --symbols BTCUSDT ETHUSDT --timeframes 1h 4h 1d || true

      - name: Summarize recommendation
        run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("metadata/retrain_status.json")
          if p.exists():
              s = json.loads(p.read_text())
              print("retrain_recommended:", s.get("retrain_recommended"))
              for r in s.get("reasons", []):
                  print(" -", r)
          else:
              print("no retrain_status.json produced")
          PY

      - name: Commit retrain status + report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metadata/retrain_status.json reports/retrain_check_*.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore(weekly): retrain recommendation [skip ci]"
            git push
          fi
